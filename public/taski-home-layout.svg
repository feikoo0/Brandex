<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark Mode Background Gradients -->
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#3a7bd5" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#111113" stop-opacity="1" />
    </radialGradient>
    
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16161f" />
      <stop offset="100%" stop-color="#121218" />
    </linearGradient>

    <!-- LED Dot Font Style -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=VT323&amp;family=Inter:wght@400;500;700;800;900&amp;display=swap');
      .title-bold { font-family: 'Inter', -apple-system, sans-serif; font-size: 28px; font-weight: 800; fill: #ffffff; letter-spacing: -0.5px; }
      .title-sub { font-family: 'Inter', -apple-system, sans-serif; font-size: 28px; font-weight: 500; fill: #94a3b8; letter-spacing: -0.5px; }
      .led-text { font-family: 'VT323', 'Courier New', monospace; font-size: 52px; font-weight: 700; fill: #fafafa; }
      .badge-txt { font-family: 'Inter', sans-serif; font-size: 8px; font-weight: 800; fill: #d4d4d4; letter-spacing: 1.5px; }
      .fin-txt { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600; fill: #cbd5e1; }
      .fin-sub { font-family: 'Inter', sans-serif; font-size: 8px; font-weight: 800; fill: #64748b; }
      .footer-txt { font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 900; fill: #475569; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Main Dark Canvas -->
  <rect width="1440" height="900" fill="#111113" />
  <rect width="1440" height="900" fill="url(#bgGlow)" />

  <!-- 1. LEFT SIDEBAR NAVIGATION -->
  <g transform="translate(0, 0)">
    <!-- Top Brandex Logo Icon (*) -->
    <g transform="translate(18, 44)">
      <path d="M12 0L14.5 9.5L24 12L14.5 14.5L12 24L9.5 14.5L0 12L9.5 9.5L12 0Z" fill="#ffffff" opacity="0.9" />
    </g>

    <!-- Sidebar Icon Items -->
    <!-- Home (Active Pill) -->
    <g transform="translate(14, 320)">
      <rect width="36" height="36" rx="12" fill="#ffffff" fill-opacity="0.1" />
      <!-- Home Icon -->
      <path d="M22 27V20H26V27H31V18H34L24 9L14 18H17V27H22Z" fill="#ffffff" transform="translate(-5, -4)" />
    </g>

    <!-- Proyectos Folder Icon -->
    <g transform="translate(20, 375)">
      <path d="M10 4H4C2.9 4 2 4.9 2 6V18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V8C22 6.9 21.1 6 20 6H12L10 4Z" fill="none" stroke="#64748b" stroke-width="1.75" />
    </g>

    <!-- Equipo Users Icon -->
    <g transform="translate(20, 425)">
      <path d="M17 21V19C17 16.8 15.2 15 13 15H5C2.8 15 1 16.8 1 19V21" fill="none" stroke="#64748b" stroke-width="1.75" />
      <circle cx="9" cy="7" r="4" fill="none" stroke="#64748b" stroke-width="1.75" />
    </g>

    <!-- Clientes Briefcase Icon -->
    <g transform="translate(20, 475)">
      <rect x="2" y="7" width="20" height="14" rx="2" fill="none" stroke="#64748b" stroke-width="1.75" />
      <path d="M16 21V5C16 3.9 15.1 3 14 3H10C8.9 3 8 3.9 8 5V21" fill="none" stroke="#64748b" stroke-width="1.75" />
    </g>

    <!-- Finanzas Dollar Icon -->
    <g transform="translate(20, 525)">
      <path d="M12 1V23M17 5H9.5C8.1 5 7 6.1 7 7.5C7 8.9 8.1 10 9.5 10H14.5C15.9 10 17 11.1 17 12.5C17 13.9 15.9 15 14.5 15H7" fill="none" stroke="#64748b" stroke-width="1.75" stroke-linecap="round" />
    </g>

    <!-- Ajustes Settings Icon -->
    <g transform="translate(20, 575)">
      <circle cx="12" cy="12" r="3" fill="none" stroke="#64748b" stroke-width="1.75" />
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" fill="none" stroke="#64748b" stroke-width="1.75" />
    </g>
  </g>

  <!-- 2. TOP HEADER SECTION -->
  <g transform="translate(216, 36)">
    <!-- Welcome Headline -->
    <text x="0" y="26" class="title-bold">Buenos días,</text>
    <text x="0" y="58" class="title-sub">bienvenido de nuevo</text>

    <!-- LED KPI Counters Center/Right -->
    <g transform="translate(340, 0)">
      <!-- Counter 1: Proyectos -->
      <g transform="translate(0, 0)">
        <text x="0" y="44" class="led-text">08</text>
        <rect x="54" y="10" width="72" height="18" rx="9" fill="#171717" stroke="#262626" />
        <text x="63" y="22" class="badge-txt">PROYECTOS</text>
      </g>

      <line x1="138" y1="12" x2="138" y2="48" stroke="#262626" stroke-width="1" />

      <!-- Counter 2: Tareas -->
      <g transform="translate(154, 0)">
        <text x="0" y="44" class="led-text">22</text>
        <rect x="54" y="10" width="58" height="18" rx="9" fill="#171717" stroke="#262626" />
        <text x="63" y="22" class="badge-txt">TAREAS</text>
      </g>

      <line x1="278" y1="12" x2="278" y2="48" stroke="#262626" stroke-width="1" />

      <!-- Counter 3: Horas -->
      <g transform="translate(294, 0)">
        <text x="0" y="44" class="led-text">542</text>
        <rect x="68" y="10" width="56" height="18" rx="9" fill="#171717" stroke="#262626" />
        <text x="77" y="22" class="badge-txt">HORAS</text>
      </g>

      <!-- Row 2: Financial Stats Bar -->
      <g transform="translate(0, 60)">
        <!-- MRR -->
        <path d="M0 6L4 2L7 5L12 0M12 0H8M12 0V4" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" />
        <text x="16" y="8" class="fin-txt">+$48.5k <tspan class="fin-sub">MRR</tspan></text>

        <line x1="90" y1="0" x2="90" y2="10" stroke="#262626" />

        <!-- Margen -->
        <path d="M102 0L110 8M110 8H104M110 8V2" fill="none" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round" />
        <text x="116" y="8" class="fin-txt">68.5% <tspan class="fin-sub">MARGEN</tspan></text>

        <line x1="196" y1="0" x2="196" y2="10" stroke="#262626" />

        <!-- Por Cobrar -->
        <rect x="208" y="0" width="10" height="8" rx="1" fill="none" stroke="#f59e0b" stroke-width="1.2" />
        <text x="222" y="8" class="fin-txt">$18.2k <tspan class="fin-sub">POR COBRAR</tspan></text>

        <line x1="324" y1="0" x2="324" y2="10" stroke="#262626" />

        <!-- Eficiencia -->
        <path d="M336 5L339 1L341 8L344 3L347 5" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" />
        <text x="352" y="8" class="fin-txt">94.8% <tspan class="fin-sub">EFICIENCIA</tspan></text>
      </g>
    </g>

    <!-- Top Right Controls: Time Heatmap & Profile Pill -->
    <g transform="translate(860, -8)">
      <!-- Time Heatmap Card -->
      <rect x="0" y="0" width="190" height="74" rx="14" fill="#141419" stroke="rgba(255,255,255,0.06)" />
      <text x="12" y="18" font-family="Inter" font-size="8" font-weight="800" fill="#64748b" letter-spacing="1">ACTIVIDAD · JULIO</text>

      <!-- Heatmap Grid Matrix (Dots) -->
      <g transform="translate(12, 26)">
        <rect x="0" y="0" width="8" height="8" rx="2" fill="#10b981" />
        <rect x="12" y="0" width="8" height="8" rx="2" fill="#10b981" />
        <rect x="24" y="0" width="8" height="8" rx="2" fill="#10b981" />
        <rect x="36" y="0" width="8" height="8" rx="2" stroke="#3b82f6" stroke-width="1.5" fill="none" />
        <rect x="48" y="0" width="8" height="8" rx="2" fill="#1e293b" />
        <rect x="60" y="0" width="8" height="8" rx="2" fill="#1e293b" />
        <rect x="72" y="0" width="8" height="8" rx="2" fill="#1e293b" />
        <rect x="84" y="0" width="8" height="8" rx="2" fill="#1e293b" />
        <rect x="96" y="0" width="8" height="8" rx="2" fill="#1e293b" />

        <rect x="0" y="12" width="8" height="8" rx="2" fill="#1e293b" />
        <rect x="12" y="12" width="8" height="8" rx="2" fill="#1e293b" />
        <rect x="24" y="12" width="8" height="8" rx="2" fill="#1e293b" />
        <rect x="36" y="12" width="8" height="8" rx="2" fill="#1e293b" />
        <rect x="48" y="12" width="8" height="8" rx="2" fill="#1e293b" />
        <rect x="60" y="12" width="8" height="8" rx="2" fill="#1e293b" />
        <rect x="72" y="12" width="8" height="8" rx="2" fill="#1e293b" />
        <rect x="84" y="12" width="8" height="8" rx="2" fill="#1e293b" />
        <rect x="96" y="12" width="8" height="8" rx="2" fill="#1e293b" />
      </g>

      <!-- Profile Pill & Sun Toggle Button -->
      <g transform="translate(90, 8)">
        <rect x="0" y="0" width="114" height="30" rx="15" fill="#0f172a" stroke="rgba(255,255,255,0.1)" />
        <circle cx="15" cy="15" r="5" fill="#ff6b00" />
        <text x="26" y="19" font-family="Inter" font-size="10" font-weight="700" fill="#ffffff">Brandex Admin</text>
      </g>
      <!-- Sun Theme Toggle -->
      <circle cx="224" cy="23" r="14" fill="#0f172a" stroke="rgba(255,255,255,0.1)" />
      <circle cx="224" cy="23" r="4" fill="#fbbf24" />
    </g>
  </g>

  <!-- 3. MAIN CANVAS HOME CONTENT (Top: 176px) -->
  <g transform="translate(216, 176)">
    <!-- LEFT SIDE: 1 LARGE RECTANGLE -->
    <g transform="translate(0, 0)">
      <rect width="760" height="420" rx="32" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />
      <rect width="760" height="420" rx="32" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
    </g>

    <!-- RIGHT SIDE: 4 SMALL RECTANGLES (2x2 GRID) -->
    <g transform="translate(784, 0)">
      <!-- Rectángulo 1 (Top-Left) -->
      <rect x="0" y="0" width="194" height="202" rx="26" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />

      <!-- Rectángulo 2 (Top-Right) -->
      <rect x="208" y="0" width="194" height="202" rx="26" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />

      <!-- Rectángulo 3 (Bottom-Left) -->
      <rect x="0" y="218" width="194" height="202" rx="26" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />

      <!-- Rectángulo 4 (Bottom-Right) -->
      <rect x="208" y="218" width="194" height="202" rx="26" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />
    </g>
  </g>

  <!-- 4. FOOTER WATERMARK -->
  <text x="1160" y="870" class="footer-txt">MODO EDICIÓN · ESPACIO DE TRABAJO</text>
</svg>
